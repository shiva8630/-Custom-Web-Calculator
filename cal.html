<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="cal.css">
    
</head>
<body>

   <div class="heading"><h1>Welcome to Custom Web Calculator</h1></div> 
    <div class="calculator">
        <input type="text" placeholder="0" id="input-box" readonly>

        <div>
            <button class="operator">AC</button>
             <button CLASS="operator">DEL</button>
             <button CLASS="operator">%</button>
             <button CLASS="operator">/</button>
             
        </div>

        <div><button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">*</button>
        </div>
            
         <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>
        </div>

         <div>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>
        </div>

         <div>
            <button>00</button>
            <button>0</button>
            <button>,</button>
            <button class="equalBtn">=</button>
        </div>

    </div>
     <div class="bottom"><h1>I am presenting my project: Custom Web Calculator</h1></div> 
     
    <script src="script.js"></script>
    
</body>
</html>
